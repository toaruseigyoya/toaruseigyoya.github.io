<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL短縮｜公開ツール一覧</title>
  <meta name="description" content="長いURLをis.gdで短縮する無料ツールです。UTM削除、任意文字列、コピー、履歴に対応しています。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/url-shortener/">
  <style>
    *,*::before,*::after{box-sizing:border-box} body{margin:0;font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif;background:#f5f6ff;color:#1e1b4b} header,main{width:min(980px,calc(100% - 24px));margin:auto} header{padding:20px 0 12px} a{color:#4f46e5;font-weight:800;text-decoration:none} h1{font-size:clamp(1.55rem,4vw,2.3rem);margin:12px 0 6px}.lead,.small{color:#64748b;line-height:1.6}.app{display:grid;grid-template-columns:minmax(300px,380px) minmax(0,1fr);gap:16px;margin:18px 0 30px}.card,.result{background:#fff;border:1px solid #e0e7ff;border-radius:12px;padding:16px;box-shadow:0 10px 24px rgba(79,70,229,.08)}label{display:block;font-size:.78rem;font-weight:900;color:#4c4980;margin:10px 0 5px}input,textarea{width:100%;border:1.5px solid #e0e7ff;border-radius:9px;padding:9px 10px;font:inherit}textarea{min-height:120px;resize:vertical}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:9px;padding:9px 13px;font:inherit;font-size:.84rem;font-weight:900;cursor:pointer;background:#eef2ff;color:#312e81}.primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}.danger{background:#ffe4e6;color:#be123c}button:disabled{opacity:.5;cursor:not-allowed}.status{padding:10px 12px;border-radius:10px;background:#eef2ff;color:#3730a3;font-weight:850;line-height:1.5}.status.ok{background:#ecfdf5;color:#047857}.status.error{background:#fff1f2;color:#be123c}.checkline{display:flex;gap:8px;align-items:center;font-weight:800;color:#4c4980}.checkline input{width:auto}.short{display:block;font-size:1.1rem;font-weight:900;word-break:break-all;margin:12px 0}.meta,.history-row{border:1px solid #e0e7ff;border-radius:10px;padding:10px;background:#fbfcff;margin-top:8px;word-break:break-all}.history{display:grid;gap:8px;margin-top:10px}@media(max-width:820px){header,main{width:min(100% - 16px,980px)}.app{grid-template-columns:1fr}button{min-height:38px}}
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="URL短縮｜公開ツール一覧">
  <meta property="og:description" content="長いURLをis.gdで短縮する無料ツールです。UTM削除、任意文字列、コピー、履歴に対応しています。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/utilities/url-shortener/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <header>
    <a href="../">← 公開ツール一覧</a>
    <h1>URL短縮</h1>
    <p class="lead">長いURLを短くします。URL短縮時は入力URLが is.gd に送信されます。</p>
  </header>
  <main>
    <div class="app">
      <section class="card">
        <label for="longUrl">短縮したいURL</label>
        <textarea id="longUrl" placeholder="https://example.com/very/long/url?utm_source=..."></textarea>
        <p class="small">注意: 社外秘URL、個人情報を含むURL、ログインが必要なURLには使わないでください。</p>
        <label for="customSlug">任意短縮文字列</label>
        <input id="customSlug" placeholder="例: my_tool_2026（5〜30文字、英数字と_）">
        <div style="display:grid;gap:8px;margin-top:10px">
          <label class="checkline"><input id="stripUtm" type="checkbox" checked> UTMなどの計測パラメータを外す</label>
          <label class="checkline"><input id="logStats" type="checkbox"> is.gd側のアクセス統計を有効にする</label>
        </div>
        <div class="row">
          <button class="primary" id="shortenBtn" type="button">URL短縮</button>
          <button id="copyCleanBtn" type="button">整形URLコピー</button>
          <button class="danger" id="clearBtn" type="button">クリア</button>
        </div>
      </section>
      <section>
        <div class="status" id="status">URLを入力してください。</div>
        <div class="result" id="resultBox" hidden>
          <strong>短縮結果</strong>
          <a class="short" id="shortUrl" href="#" target="_blank" rel="noopener"></a>
          <button id="copyShortBtn" type="button">短縮URLコピー</button>
          <div class="meta"><strong>整形後URL</strong><br><span id="cleanUrl">未生成</span></div>
        </div>
        <div class="card" style="margin-top:12px">
          <strong>履歴</strong>
          <div class="history" id="history"></div>
        </div>
      </section>
    </div>
  </main>
  <script>
    (function(){
      var $=function(id){return document.getElementById(id)}, currentShortUrl='', params=['utm_source','utm_medium','utm_campaign','utm_term','utm_content','utm_id','fbclid','gclid','yclid','mc_cid','mc_eid'];
      function setStatus(m,k){$('status').textContent=m;$('status').className='status'+(k?' '+k:'')}
      function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
      function normalizeUrl(raw){raw=String(raw||'').trim(); if(!raw) throw new Error('URLを入力してください。'); if(!/^https?:\/\//i.test(raw)) throw new Error('http:// または https:// で始まるURLだけ短縮できます。'); var u=new URL(raw); if(!/^https?:$/.test(u.protocol)) throw new Error('http:// または https:// のみ対応しています。'); if($('stripUtm').checked) params.forEach(function(p){u.searchParams.delete(p)}); return u.toString()}
      function validateSlug(s){s=s.trim(); if(!s) return ''; if(!/^[A-Za-z0-9_]{5,30}$/.test(s)) throw new Error('任意短縮文字列は5〜30文字の英数字とアンダースコアだけ使えます。'); return s}
      function jsonp(url){return new Promise(function(resolve,reject){var cb='short_'+Date.now()+'_'+Math.floor(Math.random()*99999), sc=document.createElement('script'), timer=setTimeout(function(){cleanup();reject(new Error('is.gdから応答がありませんでした。'))},12000); function cleanup(){clearTimeout(timer);delete window[cb]; if(sc.parentNode) sc.parentNode.removeChild(sc)} window[cb]=function(data){cleanup();resolve(data)}; sc.onerror=function(){cleanup();reject(new Error('is.gdへ接続できませんでした。'))}; sc.src=url+'&callback='+encodeURIComponent(cb); document.body.appendChild(sc)})}
      async function shorten(){try{$('shortenBtn').disabled=true;setStatus('処理中... URLを短縮しています。'); var clean=normalizeUrl($('longUrl').value), slug=validateSlug($('customSlug').value), api='https://is.gd/create.php?format=json&url='+encodeURIComponent(clean); if(slug) api+='&shorturl='+encodeURIComponent(slug); if($('logStats').checked) api+='&logstats=1'; var data=await jsonp(api); if(!data||data.errormessage) throw new Error(data&&data.errormessage?data.errormessage:'短縮URLを取得できませんでした。'); currentShortUrl=data.shorturl; $('shortUrl').textContent=currentShortUrl; $('shortUrl').href=currentShortUrl; $('cleanUrl').textContent=clean; $('resultBox').hidden=false; saveHistory(clean,currentShortUrl); renderHistory(); setStatus('短縮URLを作成しました。','ok')}catch(e){setStatus(e.message,'error')}finally{$('shortenBtn').disabled=false}}
      function copy(t){if(!t)return setStatus('コピーする内容がありません。','error'); navigator.clipboard.writeText(t).then(function(){setStatus('コピーしました。','ok')},function(){setStatus('コピーできませんでした。手動で選択してください。','error')})}
      function saveHistory(longUrl,shortUrl){var list=[];try{list=JSON.parse(localStorage.getItem('url-shortener-history')||'[]')}catch(e){} list=list.filter(function(x){return x.shortUrl!==shortUrl}); list.unshift({longUrl:longUrl,shortUrl:shortUrl,at:new Date().toLocaleString('ja-JP')}); try{localStorage.setItem('url-shortener-history',JSON.stringify(list.slice(0,8)))}catch(e){}}
      function renderHistory(){var list=[];try{list=JSON.parse(localStorage.getItem('url-shortener-history')||'[]')}catch(e){} $('history').innerHTML=list.length?list.map(function(x,i){return '<div class="history-row"><a href="'+esc(x.shortUrl)+'" target="_blank" rel="noopener">'+esc(x.shortUrl)+'</a><br><span class="small">'+esc(x.at)+' / '+esc(x.longUrl)+'</span><br><button type="button" data-copy-history="'+i+'">コピー</button></div>'}).join(''):'<p class="small">履歴はまだありません。</p>'}
      $('shortenBtn').addEventListener('click',shorten); $('copyShortBtn').addEventListener('click',function(){copy(currentShortUrl)}); $('copyCleanBtn').addEventListener('click',function(){try{var c=normalizeUrl($('longUrl').value);$('cleanUrl').textContent=c;copy(c)}catch(e){setStatus(e.message,'error')}}); $('clearBtn').addEventListener('click',function(){$('longUrl').value='';$('customSlug').value='';$('cleanUrl').textContent='未生成';$('resultBox').hidden=true;currentShortUrl='';setStatus('URLを入力してください。')}); document.addEventListener('click',function(e){var b=e.target.closest('[data-copy-history]'); if(!b)return; var list=[];try{list=JSON.parse(localStorage.getItem('url-shortener-history')||'[]')}catch(err){} var item=list[Number(b.getAttribute('data-copy-history'))]; if(item)copy(item.shortUrl)}); renderHistory();
    })();
  </script>
</body>
</html>
