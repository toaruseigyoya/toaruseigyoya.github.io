<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名前メーカー｜公開ツール一覧</title>
  <meta name="description" content="用途、雰囲気、文字種、文字数、入れたい語句、NGワードを反映して名前候補を生成します。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/name-maker/">
  <style>
    *,*::before,*::after{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif;background:#f5f6ff;color:#1e1b4b}header,main{width:min(1120px,calc(100% - 24px));margin:auto}header{padding:20px 0 12px}a{color:#4f46e5;font-weight:800;text-decoration:none}h1{font-size:clamp(1.55rem,4vw,2.3rem);margin:12px 0 6px}.lead{color:#64748b;line-height:1.6}.app{display:grid;grid-template-columns:minmax(300px,360px) minmax(0,1fr);gap:16px;margin:18px 0 30px}.card{background:#fff;border:1px solid #e0e7ff;border-radius:12px;padding:16px;box-shadow:0 10px 24px rgba(79,70,229,.08)}label{display:block;font-size:.78rem;font-weight:900;color:#4c4980;margin:10px 0 5px}input,select{width:100%;border:1.5px solid #e0e7ff;border-radius:9px;padding:9px 10px;font:inherit}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.checkline{display:flex;gap:8px;align-items:center;font-weight:800;color:#4c4980}.checkline input{width:auto}button{border:0;border-radius:9px;padding:9px 13px;font:inherit;font-size:.84rem;font-weight:900;cursor:pointer;background:#eef2ff;color:#312e81}.primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}.status{padding:10px 12px;border-radius:10px;background:#eef2ff;color:#3730a3;font-weight:850;line-height:1.5;margin-bottom:12px}.status.ok{background:#ecfdf5;color:#047857}.status.error{background:#fff1f2;color:#be123c}.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}.summary div{background:#fff;border:1px solid #e0e7ff;border-radius:10px;padding:9px;font-size:.78rem;color:#4c4980;font-weight:800}.summary strong{display:block;color:#4f46e5;font-size:1.05rem}.results{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}.name{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:8px;border:1px solid #e0e7ff;border-radius:11px;background:#fff;padding:10px}.main{font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.sub{grid-column:1/-1;color:#64748b;font-size:.78rem;font-weight:800}@media(max-width:860px){header,main{width:min(100% - 16px,1120px)}.app,.grid2,.summary,.results{grid-template-columns:1fr}button{min-height:38px}}
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="名前メーカー｜公開ツール一覧">
  <meta property="og:description" content="用途、雰囲気、文字種、文字数、入れたい語句、NGワードを反映して名前候補を生成します。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/utilities/name-maker/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <header>
    <a href="../">← 公開ツール一覧</a>
    <h1>名前メーカー</h1>
    <p class="lead">ハンドルネーム、ブログ名、サービス名、キャラクター名などを目的別の語彙から生成します。</p>
  </header>
  <main>
    <div class="app">
      <section class="card">
        <label for="purpose">使用目的</label><select id="purpose"></select>
        <div class="grid2">
          <div><label for="mood">雰囲気</label><select id="mood"><option value="auto">自動</option><option value="cute">かわいい</option><option value="cool">かっこいい</option><option value="jp">和風</option><option value="ai">AI風</option><option value="simple">シンプル</option></select></div>
          <div><label for="scriptType">文字種</label><select id="scriptType"><option value="auto">自動</option><option value="kana">かな・カナ</option><option value="kanji">漢字</option><option value="en">英語</option><option value="mixed">混合</option></select></div>
        </div>
        <div class="grid2">
          <div><label for="count">生成数</label><select id="count"><option>5</option><option selected>10</option><option>20</option><option>50</option></select></div>
          <div><label for="lengthType">文字数目安</label><select id="lengthType"><option value="short">短め</option><option value="normal" selected>普通</option><option value="long">長め</option></select></div>
        </div>
        <label for="keyword">入れたい語句</label><input id="keyword" placeholder="例: AI、現場、空、ねこ">
        <label for="ngWords">NGワード</label><input id="ngWords" placeholder="例: 古い,危険,社名">
        <div style="display:grid;gap:8px;margin-top:10px">
          <label class="checkline"><input type="checkbox" id="ngCheck" checked> NGワードを除外</label>
          <label class="checkline"><input type="checkbox" id="uniqueCheck" checked> 重複候補を除外</label>
        </div>
        <div class="row">
          <button class="primary" type="button" id="generateBtn">名前を生成</button>
          <button type="button" id="copyAllBtn">一括コピー</button>
          <button type="button" id="csvBtn">CSV保存</button>
        </div>
      </section>
      <section>
        <div class="status" id="status">条件を選んで名前を生成してください。</div>
        <div class="summary" id="summary"></div>
        <div class="results" id="results"></div>
      </section>
    </div>
  </main>
  <script>
    (function(){
      var $=function(id){return document.getElementById(id)}, last=[];
      var purposes={handle:['ハンドルネーム','SNSやゲーム用'],blog:['ブログ名','個人サイト・記録用'],service:['サービス名','Webサービス・アプリ用'],project:['プロジェクト名','開発・業務改善用'],character:['キャラクター名','創作用'],shop:['店名','店舗・工房用'],ai:['AIツール名','AI風ツール用']};
      var table={cute:{a:['ふわ','もち','ころ','ぴこ','みる','こは','ゆる','ぽぽ'],b:['ねこ','そら','はな','まる','りす','くま','こと','みず'],c:['りん','たん','ぽん','まる','ちゃん','ラボ']},cool:{a:['Nova','Core','Blue','Rapid','Solid','Next','Clear','Shift'],b:['Flow','Link','Gate','Works','Studio','Deck','Pilot','Base'],c:['Hub','One','Pro','Lab','Sync','Drive']},jp:{a:['月','風','雪','花','蒼','白','千','灯','森'],b:['こよみ','しずく','あかり','ひより','かなた','つむぎ','みなと'],c:['庵','堂','録','日和','工房','帳']},ai:{a:['AI','Prompt','Agent','Auto','Smart','Neural','Text','Data'],b:['Maker','Builder','Writer','Studio','Pilot','Engine','Helper'],c:['AI','Hub','Lab','Flow','Bot','Kit']},simple:{a:['Task','Note','File','Work','Web','Link','Daily'],b:['Box','Board','List','Pad','Tools','Desk'],c:['App','Kit','Hub','One','Go']}};
      function pick(a){return a[Math.floor(Math.random()*a.length)]} function len(s){return Array.from(s).length} function esc(s){return String(s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
      function moodKey(){var m=$('mood').value;if(m==='auto')m=purposeKey()==='ai'?'ai':purposeKey()==='shop'?'jp':Math.random()>.5?'cool':'cute';return m}
      function purposeKey(){return $('purpose').value}
      function range(){var t=$('lengthType').value;return t==='short'?[2,10]:t==='long'?[5,28]:[3,18]}
      function scriptOk(n){var t=$('scriptType').value;if(t==='auto'||t==='mixed')return true;if(t==='en')return /^[A-Za-z0-9_-]+$/.test(n);if(t==='kanji')return /[\u4e00-\u9fff]/.test(n);if(t==='kana')return /^[ぁ-んァ-ヶー]+$/.test(n);return true}
      function build(){var t=table[moodKey()]||table.cool, join=/^[A-Za-z]/.test(t.a[0])?pick(['','-','_']):''; var n=pick(t.a)+join+pick(t.b)+(Math.random()>.45?join+pick(t.c):''); var kw=$('keyword').value.trim(); if(kw&&Math.random()>.45)n=Math.random()>.5?kw+n:n+kw; return n}
      function bad(n){var ng=$('ngWords').value.split(/[,\s、]+/).filter(Boolean);return ng.some(function(w){return n.includes(w)})||/(.)\1\1\1/.test(n)}
      function generate(){var count=Number($('count').value), r=range(), uniq=$('uniqueCheck').checked, ng=$('ngCheck').checked, out=[], tries=0; while(out.length<count&&tries++<count*200){var n=build();if(len(n)<r[0]||len(n)>r[1])continue;if(!scriptOk(n))continue;if(ng&&bad(n))continue;if(uniq&&out.some(function(x){return x.name===n}))continue;out.push({name:n,info:purposes[purposeKey()][0]+'向け / '+moodKey()+' / '+len(n)+'文字'})} last=out; render()}
      function render(){var p=purposes[purposeKey()];$('status').textContent=last.length?last.length+'件生成しました。':'条件に合う候補がありません。条件をゆるめてください。';$('status').className='status '+(last.length?'ok':'error');$('summary').innerHTML='<div><strong>'+esc(p[0])+'</strong>目的</div><div><strong>'+esc($('mood').selectedOptions[0].textContent)+'</strong>雰囲気</div><div><strong>'+esc($('scriptType').selectedOptions[0].textContent)+'</strong>文字種</div><div><strong>'+last.length+'</strong>件数</div>';$('results').innerHTML=last.map(function(x){return '<div class="name"><div class="main">'+esc(x.name)+'</div><button data-copy="'+esc(x.name)+'" type="button">コピー</button><div class="sub">'+esc(x.info)+'</div></div>'}).join('')}
      function copy(t){if(!t)return;$('status').textContent='コピー中...';navigator.clipboard.writeText(t).then(function(){$('status').textContent='コピーしました。';$('status').className='status ok'},function(){$('status').textContent='コピーできませんでした。';$('status').className='status error'})}
      function csv(){if(!last.length)return $('status').textContent='保存する候補がありません。';var body='\uFEFFname,info\n'+last.map(function(x){return '"'+x.name.replace(/"/g,'""')+'","'+x.info.replace(/"/g,'""')+'"'}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob([body],{type:'text/csv;charset=utf-8'}));a.download='name-maker.csv';a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},1000)}
      Object.keys(purposes).forEach(function(k){var o=document.createElement('option');o.value=k;o.textContent=purposes[k][0]+' - '+purposes[k][1];$('purpose').appendChild(o)});$('generateBtn').addEventListener('click',generate);$('copyAllBtn').addEventListener('click',function(){copy(last.map(function(x){return x.name}).join('\n'))});$('csvBtn').addEventListener('click',csv);document.addEventListener('click',function(e){var b=e.target.closest('[data-copy]');if(b)copy(b.getAttribute('data-copy'))});['purpose','mood','scriptType','count','lengthType','ngCheck','uniqueCheck'].forEach(function(id){$(id).addEventListener('change',generate)});generate();
    })();
  </script>
</body>
</html>
