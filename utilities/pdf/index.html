<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF結合・分割ツール｜公開ツール一覧</title>
  <meta name="description" content="複数PDFをブラウザ内で結合・分割できる無料ツールです。ページ範囲指定とZIP出力に対応しています。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/pdf/">
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    :root { --bg:#f0f7ff; --panel:#fff; --line:#cbd5e1; --text:#172554; --muted:#64748b; --blue:#2563eb; --cyan:#0891b2; --green:#15803d; --rose:#e11d48; --amber:#b45309; }
    body { margin:0; font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif; background:linear-gradient(180deg,#eff6ff,#f8fafc); color:var(--text); }
    header, main { width:min(1180px, calc(100% - 24px)); margin:auto; }
    header { padding:18px 0 10px; }
    a { color:var(--blue); font-weight:800; text-decoration:none; }
    h1 { margin:14px 0 8px; font-size:clamp(1.6rem, 4vw, 2.4rem); }
    h2 { margin:0 0 10px; font-size:1.05rem; }
    p { line-height:1.7; }
    .lead { color:var(--muted); margin:0; }
    .layout { display:grid; grid-template-columns:minmax(320px,420px) minmax(0,1fr); gap:16px; align-items:start; margin:18px 0 30px; }
    .panel { background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:12px; padding:16px; box-shadow:0 12px 30px rgba(37,99,235,.08); }
    .drop { border:2px dashed #93c5fd; border-radius:12px; padding:24px 14px; text-align:center; background:#f8fbff; cursor:pointer; }
    .drop.dragging { border-color:var(--cyan); background:#ecfeff; }
    body.dragging::after { content:"PDFをこの画面にドロップして追加"; position:fixed; inset:12px; z-index:9999; display:grid; place-items:center; border:3px dashed var(--cyan); border-radius:18px; background:rgba(236,254,255,.86); color:var(--text); font-size:1.2rem; font-weight:900; pointer-events:none; }
    .small { color:var(--muted); font-size:.82rem; font-weight:700; }
    .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    button { border:0; border-radius:9px; padding:9px 13px; font:inherit; font-size:.84rem; font-weight:900; cursor:pointer; background:#e0f2fe; color:var(--text); }
    button.primary { color:#fff; background:linear-gradient(135deg,var(--blue),var(--cyan)); }
    button.danger { color:#be123c; background:#ffe4e6; }
    button:disabled { opacity:.48; cursor:not-allowed; }
    input, select, textarea { width:100%; border:1px solid var(--line); border-radius:9px; padding:8px 10px; font:inherit; background:#fff; color:var(--text); }
    textarea { min-height:120px; resize:vertical; line-height:1.5; }
    .hidden { display:none; }
    .status { margin-top:12px; padding:10px 12px; border-radius:10px; background:#eff6ff; color:#1d4ed8; font-weight:800; white-space:pre-line; }
    .status.ok { background:#ecfdf5; color:var(--green); }
    .status.error { background:#fff1f2; color:#be123c; }
    .status.warn { background:#fffbeb; color:var(--amber); }
    .tabs { display:flex; gap:8px; margin-bottom:12px; }
    .tabs button.active { color:#fff; background:linear-gradient(135deg,var(--blue),var(--cyan)); }
    .file-list { display:grid; gap:9px; }
    .file-row { display:grid; grid-template-columns:minmax(0,1fr) 110px auto; gap:8px; align-items:center; padding:9px; border:1px solid var(--line); border-radius:10px; background:#f8fafc; }
    .file-row.selected { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .file-name { font-weight:900; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .file-meta { color:var(--muted); font-size:.78rem; margin-top:2px; }
    .tools { display:flex; gap:5px; flex-wrap:wrap; justify-content:flex-end; }
    .tools button { padding:6px 8px; min-width:32px; }
    .panel-mode { display:none; }
    .panel-mode.active { display:block; }
    .hint { color:var(--muted); font-size:.85rem; line-height:1.6; }
    .name-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:10px 0; }
    .preview-wrap { margin-top:14px; display:grid; grid-template-columns:160px minmax(0,1fr); gap:12px; }
    .thumbs { max-height:420px; overflow:auto; display:grid; gap:8px; padding-right:4px; }
    .thumb { border:1px solid var(--line); border-radius:10px; background:#fff; padding:7px; display:grid; gap:6px; }
    .thumb.active { border-color:var(--blue); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
    .thumb canvas { width:100%; height:auto; display:block; background:#f8fafc; border-radius:6px; }
    .thumb label { display:flex; gap:6px; align-items:center; font-size:.78rem; font-weight:900; }
    .preview-main { min-height:320px; border:1px solid var(--line); border-radius:12px; background:#f8fafc; padding:10px; overflow:auto; }
    .preview-main canvas { max-width:100%; height:auto; display:block; margin:auto; background:#fff; box-shadow:0 8px 18px rgba(15,23,42,.12); }
    @media (max-width: 760px) {
      header, main { width:min(100% - 16px, 1180px); }
      .layout { grid-template-columns:1fr; }
      .file-row { grid-template-columns:1fr; }
      .tools { justify-content:flex-start; }
      .name-grid, .preview-wrap { grid-template-columns:1fr; }
      button { min-height:38px; }
    }
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="PDF結合・分割ツール｜公開ツール一覧">
  <meta property="og:description" content="複数PDFをブラウザ内で結合・分割できる無料ツールです。ページ範囲指定とZIP出力に対応しています。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/utilities/pdf/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <header>
    <a href="../">← 公開ツール一覧</a>
    <h1>PDF結合・分割ツール</h1>
    <p class="lead">PDFの追加、順序変更、ページ範囲指定、結合、分割ZIP保存をブラウザ内で行います。</p>
  </header>
  <main>
    <div class="layout">
      <section class="panel">
        <h2>PDF追加</h2>
        <div class="drop" id="dropZone">
          <strong>PDFをドラッグ＆ドロップ</strong>
          <div class="small">PDFは画面上のどこにドラッグしても追加できます。</div>
        </div>
        <input class="hidden" id="fileInput" type="file" accept="application/pdf,.pdf" multiple>
        <input class="hidden" id="folderInput" type="file" accept="application/pdf,.pdf" webkitdirectory directory multiple>
        <div class="row" style="margin-top:10px">
          <button type="button" id="pickFiles">ファイルを選択</button>
          <button type="button" id="pickFolder">フォルダから選択</button>
          <button type="button" class="danger" id="clearFiles">全削除</button>
        </div>
        <div class="status" id="status">PDFを追加してください。</div>
      </section>

      <section class="panel">
        <div class="tabs">
          <button type="button" class="active" id="mergeTab">結合</button>
          <button type="button" id="splitTab">分割</button>
          <span class="small" id="fileCount">0件</span>
        </div>

        <div class="panel-mode active" id="mergePanel">
          <p class="hint">上から順に結合します。範囲は <code>all</code>, <code>1</code>, <code>1-3</code>, <code>2,5-7</code>, <code>5-</code> が使えます。</p>
          <label for="mergeName">結合後ファイル名</label>
          <input id="mergeName" type="text" value="merged.pdf" placeholder="merged.pdf">
          <div class="file-list" id="fileList"></div>
          <div class="row" style="margin-top:12px">
            <button type="button" id="rotateAll90" disabled>選択PDFを90°回転</button>
            <button type="button" id="rotateAll180" disabled>選択PDFを180°回転</button>
            <button type="button" class="primary" id="mergeButton" disabled>指定順でPDF結合</button>
          </div>
        </div>

        <div class="panel-mode" id="splitPanel">
          <p class="hint">分割元PDFを選び、1行に1つずつ出力範囲を入力します。複数PDFはZIPにまとめて保存します。</p>
          <label for="splitSource">分割元PDF</label>
          <select id="splitSource"></select>
          <label for="splitRanges" style="display:block;margin-top:10px">分割範囲</label>
          <textarea id="splitRanges" placeholder="1&#10;2-3&#10;4-"></textarea>
          <label for="splitBaseName" style="display:block;margin-top:10px">分割後ファイル名ベース</label>
          <input id="splitBaseName" type="text" placeholder="元ファイル名_split">
          <div class="row" style="margin-top:10px">
            <button type="button" id="splitEveryPage" disabled>全ページを1ページずつ</button>
            <button type="button" class="primary" id="splitButton" disabled>範囲ごとにPDF分割</button>
          </div>
        </div>
        <div class="preview-wrap">
          <div>
            <h2>ページ一覧</h2>
            <p class="hint">チェックを外すと結合対象から除外します。行はドラッグ、または矢印で並び替えできます。</p>
            <div class="thumbs" id="thumbList"></div>
          </div>
          <div>
            <h2>PDFプレビュー</h2>
            <div class="row" style="margin-bottom:8px">
              <button type="button" id="prevPage" disabled>前へ</button>
              <button type="button" id="nextPage" disabled>次へ</button>
              <button type="button" id="rotatePage90" disabled>ページ90°回転</button>
              <span class="small" id="previewInfo">未選択</span>
            </div>
            <div class="preview-main"><canvas id="previewCanvas"></canvas></div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function () {
      'use strict';
      var files = [];
      var mode = 'merge';
      var selectedFileId = null;
      var selectedPageIndex = 0;
      var $ = function (id) { return document.getElementById(id); };
      var dropZone = $('dropZone'), fileInput = $('fileInput'), folderInput = $('folderInput');
      var fileList = $('fileList'), fileCount = $('fileCount'), status = $('status');
      var mergeTab = $('mergeTab'), splitTab = $('splitTab'), mergePanel = $('mergePanel'), splitPanel = $('splitPanel');
      var splitSource = $('splitSource'), splitRanges = $('splitRanges');
      var thumbList = $('thumbList'), previewCanvas = $('previewCanvas'), previewInfo = $('previewInfo');

      if (window.pdfjsLib) {
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }

      function setStatus(message, kind) {
        status.textContent = message;
        status.className = 'status' + (kind ? ' ' + kind : '');
      }
      function hasFiles(event) {
        return event.dataTransfer && Array.prototype.includes.call(event.dataTransfer.types || [], 'Files');
      }
      document.addEventListener('dragenter', function (e) {
        if (!hasFiles(e)) return;
        e.preventDefault();
        document.body.classList.add('dragging');
      });
      document.addEventListener('dragover', function (e) {
        if (!hasFiles(e)) return;
        e.preventDefault();
        document.body.classList.add('dragging');
      });
      document.addEventListener('dragleave', function (e) {
        if (!e.relatedTarget) document.body.classList.remove('dragging');
      });
      document.addEventListener('drop', function (e) {
        if (!hasFiles(e)) return;
        e.preventDefault();
        document.body.classList.remove('dragging');
        addFiles(e.dataTransfer.files);
      });
      function friendlyPdfError(prefix, error) {
        console.error('[PDF tool]', error);
        var message = String(error && error.message || '');
        if (/範囲|出力対象|ページチェック/.test(message)) return prefix + message;
        return prefix + 'PDFが保護されている、または読み取りできない形式のため処理できませんでした。\nパスワード保護・編集制限を解除するか、PDFを保存し直してから再度お試しください。\n\n考えられる原因：パスワード付きPDF、暗号化PDF、編集制限付きPDF、破損PDF、未対応PDF形式';
      }

      function setBusy(isBusy) {
        ['mergeButton','splitButton','splitEveryPage','pickFiles','pickFolder','clearFiles','rotateAll90','rotateAll180','rotatePage90','prevPage','nextPage'].forEach(function (id) {
          var el = $(id);
          if (el) el.disabled = isBusy || (['mergeButton','splitButton','splitEveryPage'].includes(id) && !files.length);
        });
      }
      function bytes(size) {
        if (size > 1024 * 1024) return (size / 1024 / 1024).toFixed(1) + 'MB';
        return Math.max(1, Math.round(size / 1024)) + 'KB';
      }
      function readArrayBuffer(file) {
        return new Promise(function (resolve, reject) {
          var reader = new FileReader();
          reader.onerror = function () { reject(new Error('ファイルを読み込めませんでした。')); };
          reader.onload = function () { resolve(reader.result); };
          reader.readAsArrayBuffer(file);
        });
      }
      async function getPageCount(file) {
        if (!window.pdfjsLib) throw new Error('PDF解析ライブラリを読み込めませんでした。通信状態を確認してください。');
        var data = await readArrayBuffer(file);
        var pdf = await pdfjsLib.getDocument({ data: data }).promise;
        return pdf.numPages;
      }
      async function loadPdfLibDocument(file) {
        var data = await readArrayBuffer(file);
        try {
          return await PDFLib.PDFDocument.load(data);
        } catch (error) {
          try {
            return await PDFLib.PDFDocument.load(data, { ignoreEncryption: true });
          } catch (retryError) {
            throw new Error('PDFが保護されている、または読み取りできない形式です。');
          }
        }
      }
      function selectedItem() {
        return files.find(function (item) { return item.id === selectedFileId; }) || files[0] || null;
      }
      function ensurePdfName(name, fallback) {
        var clean = String(name || '').trim() || fallback;
        return /\.pdf$/i.test(clean) ? clean : clean + '.pdf';
      }
      function safeBaseName(name, fallback) {
        return String(name || '').trim().replace(/[\\/:*?"<>|]/g, '_').replace(/\.pdf$/i, '') || fallback;
      }
      async function addFiles(list) {
        var incoming = Array.prototype.slice.call(list || []).filter(function (file) {
          return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
        });
        if (!incoming.length) {
          setStatus('PDFファイルだけ追加できます。', 'error');
          return;
        }
        setStatus('PDFを読み込んでいます...');
        setBusy(true);
        try {
          for (var i = 0; i < incoming.length; i++) {
            var file = incoming[i];
            var pageCount = await getPageCount(file);
            var item = {
              id: Date.now() + '-' + Math.random(),
              file: file,
              pages: pageCount,
              range: 'all',
              pageOrder: Array.from({ length: pageCount }, function (_, index) { return { page: index, include: true, rotate: 0 }; })
            };
            files.push(item);
            if (!selectedFileId) selectedFileId = item.id;
          }
          render();
          setStatus(files.length + '件のPDFを追加しました。', 'ok');
        } catch (error) {
          setStatus(friendlyPdfError('', error), 'error');
        } finally {
          setBusy(false);
          render();
        }
      }
      function parseRange(text, pageCount) {
        var value = String(text || 'all').trim().toLowerCase();
        if (!value || value === 'all' || value === 'すべて') return Array.from({ length: pageCount }, function (_, i) { return i; });
        var result = [];
        value.split(',').forEach(function (part) {
          part = part.trim();
          if (!part) return;
          var m = part.match(/^(\d+)(?:-(\d*)?)?$/);
          if (!m) throw new Error('範囲指定が不正です: ' + part);
          var start = Number(m[1]);
          var end = m[2] === undefined ? start : (m[2] === '' ? pageCount : Number(m[2]));
          if (!start || !end || start > end || start > pageCount) throw new Error('範囲がページ数を超えています: ' + part);
          end = Math.min(end, pageCount);
          for (var i = start; i <= end; i++) result.push(i - 1);
        });
        if (!result.length) throw new Error('有効な範囲がありません。');
        return Array.from(new Set(result));
      }
      function downloadBlob(name, blob) {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);
      }
      function render() {
        fileCount.textContent = files.length + '件';
        fileList.innerHTML = '';
        splitSource.innerHTML = '';
        files.forEach(function (item, index) {
          var row = document.createElement('div');
          row.className = 'file-row';
          if (item.id === selectedFileId) row.className += ' selected';
          row.innerHTML = '<div><div class="file-name"></div><div class="file-meta"></div></div><input aria-label="範囲"><div class="tools"></div>';
          row.querySelector('.file-name').textContent = item.file.name;
          row.querySelector('.file-meta').textContent = item.pages + 'ページ / ' + bytes(item.file.size);
          var input = row.querySelector('input');
          input.value = item.range;
          input.addEventListener('change', function () { item.range = input.value.trim() || 'all'; });
          var tools = row.querySelector('.tools');
          row.addEventListener('click', function (event) {
            if (event.target.closest('button') || event.target.closest('input')) return;
            selectedFileId = item.id;
            selectedPageIndex = 0;
            render();
          });
          [['↑', -1], ['↓', 1]].forEach(function (pair) {
            var b = document.createElement('button');
            b.type = 'button'; b.textContent = pair[0]; b.disabled = index + pair[1] < 0 || index + pair[1] >= files.length;
            b.addEventListener('click', function () { var next = index + pair[1]; var tmp = files[index]; files[index] = files[next]; files[next] = tmp; render(); });
            tools.appendChild(b);
          });
          var remove = document.createElement('button');
          remove.type = 'button'; remove.textContent = '削除'; remove.className = 'danger';
          remove.addEventListener('click', function () {
            files = files.filter(function (x) { return x.id !== item.id; });
            if (selectedFileId === item.id) {
              selectedFileId = files[0] ? files[0].id : null;
              selectedPageIndex = 0;
            }
            render();
            setStatus(files.length ? files.length + '件のPDFがあります。' : 'PDFを追加してください。');
          });
          tools.appendChild(remove);
          fileList.appendChild(row);
          var option = document.createElement('option');
          option.value = item.id; option.textContent = item.file.name + '（' + item.pages + 'ページ）';
          splitSource.appendChild(option);
        });
        $('mergeButton').disabled = !files.length;
        $('splitButton').disabled = !files.length;
        $('splitEveryPage').disabled = !files.length;
        $('rotateAll90').disabled = !selectedItem();
        $('rotateAll180').disabled = !selectedItem();
        renderPagePreview();
      }
      async function renderPagePreview() {
        thumbList.innerHTML = '';
        var item = selectedItem();
        if (!item) {
          previewInfo.textContent = '未選択';
          previewCanvas.getContext('2d').clearRect(0, 0, previewCanvas.width, previewCanvas.height);
          ['prevPage','nextPage','rotatePage90'].forEach(function (id) { $(id).disabled = true; });
          return;
        }
        selectedFileId = item.id;
        if (selectedPageIndex >= item.pageOrder.length) selectedPageIndex = Math.max(0, item.pageOrder.length - 1);
        ['prevPage','nextPage','rotatePage90'].forEach(function (id) { $(id).disabled = !item.pageOrder.length; });
        try {
          var pdf = await pdfjsLib.getDocument({ data: await readArrayBuffer(item.file) }).promise;
          item.pageOrder.forEach(function (pageInfo, index) {
            var card = document.createElement('div');
            card.className = 'thumb' + (index === selectedPageIndex ? ' active' : '');
            card.draggable = true;
            card.addEventListener('dragstart', function (event) {
              event.dataTransfer.setData('text/plain', String(index));
              event.dataTransfer.effectAllowed = 'move';
            });
            card.addEventListener('dragover', function (event) {
              event.preventDefault();
              event.dataTransfer.dropEffect = 'move';
            });
            card.addEventListener('drop', function (event) {
              event.preventDefault();
              var from = Number(event.dataTransfer.getData('text/plain'));
              if (!Number.isInteger(from) || from === index || from < 0 || from >= item.pageOrder.length) return;
              var moved = item.pageOrder.splice(from, 1)[0];
              item.pageOrder.splice(index, 0, moved);
              selectedPageIndex = index;
              render();
            });
            var label = document.createElement('label');
            var check = document.createElement('input');
            check.type = 'checkbox';
            check.checked = pageInfo.include;
            check.addEventListener('change', function () { pageInfo.include = check.checked; });
            label.appendChild(check);
            label.appendChild(document.createTextNode((index + 1) + ': 元' + (pageInfo.page + 1) + 'P / ' + pageInfo.rotate + '°'));
            var canvas = document.createElement('canvas');
            var row = document.createElement('div');
            row.className = 'tools';
            [['↑', -1], ['↓', 1]].forEach(function (pair) {
              var b = document.createElement('button');
              b.type = 'button'; b.textContent = pair[0];
              b.disabled = index + pair[1] < 0 || index + pair[1] >= item.pageOrder.length;
              b.addEventListener('click', function () {
                var next = index + pair[1], tmp = item.pageOrder[index];
                item.pageOrder[index] = item.pageOrder[next]; item.pageOrder[next] = tmp;
                selectedPageIndex = next; render();
              });
              row.appendChild(b);
            });
            var rotate = document.createElement('button');
            rotate.type = 'button'; rotate.textContent = '回転';
            rotate.addEventListener('click', function () { pageInfo.rotate = (pageInfo.rotate + 90) % 360; render(); });
            row.appendChild(rotate);
            card.appendChild(label);
            card.appendChild(canvas);
            card.appendChild(row);
            card.addEventListener('click', function (event) {
              if (event.target.closest('button') || event.target.closest('input')) return;
              selectedPageIndex = index; renderPagePreview();
            });
            thumbList.appendChild(card);
            pdf.getPage(pageInfo.page + 1).then(function (page) {
              var viewport = page.getViewport({ scale: .22, rotation: pageInfo.rotate });
              canvas.width = viewport.width; canvas.height = viewport.height;
              page.render({ canvasContext: canvas.getContext('2d'), viewport: viewport });
            });
          });
          var current = item.pageOrder[selectedPageIndex];
          if (current) {
            var page = await pdf.getPage(current.page + 1);
            var viewport = page.getViewport({ scale: 1.25, rotation: current.rotate });
            previewCanvas.width = viewport.width; previewCanvas.height = viewport.height;
            await page.render({ canvasContext: previewCanvas.getContext('2d'), viewport: viewport }).promise;
            previewInfo.textContent = item.file.name + ' / ' + (selectedPageIndex + 1) + '/' + item.pageOrder.length + '（元' + (current.page + 1) + 'P）';
          }
        } catch (error) {
          previewInfo.textContent = 'プレビューできません: ' + error.message;
        }
      }
      function rotateSelectedPages(deg) {
        var item = selectedItem();
        if (!item) return;
        item.pageOrder.forEach(function (page) { page.rotate = (page.rotate + deg) % 360; });
        render();
      }
      function rotateCurrentPage() {
        var item = selectedItem();
        if (!item || !item.pageOrder[selectedPageIndex]) return;
        item.pageOrder[selectedPageIndex].rotate = (item.pageOrder[selectedPageIndex].rotate + 90) % 360;
        render();
      }
      async function mergePdf() {
        if (!files.length) return setStatus('結合するPDFを追加してください。', 'error');
        if (!window.PDFLib) return setStatus('PDF生成ライブラリを読み込めませんでした。', 'error');
        setStatus('処理中... PDFを結合しています。'); setBusy(true);
        try {
          var out = await PDFLib.PDFDocument.create();
          var copied = 0;
          for (var i = 0; i < files.length; i++) {
            var item = files[i];
            var src = await loadPdfLibDocument(item.file);
            var allowed = parseRange(item.range, src.getPageCount());
            var indexes = item.pageOrder.filter(function (page) {
              return page.include && allowed.includes(page.page);
            }).map(function (page) { return page.page; });
            if (!indexes.length) continue;
            var pages = await out.copyPages(src, indexes);
            pages.forEach(function (p, pageIndex) {
              var pageInfo = item.pageOrder.filter(function (page) { return page.include && allowed.includes(page.page); })[pageIndex];
              if (pageInfo && pageInfo.rotate) p.setRotation(PDFLib.degrees(pageInfo.rotate));
              out.addPage(p); copied++;
            });
          }
          if (!copied) throw new Error('出力対象ページがありません。ページチェックと範囲指定を確認してください。');
          var mergeName = ensurePdfName($('mergeName').value, 'merged.pdf');
          downloadBlob(mergeName, new Blob([await out.save()], { type:'application/pdf' }));
          setStatus('結合完了: ' + copied + 'ページを ' + mergeName + ' として保存しました。', 'ok');
        } catch (error) {
          setStatus(friendlyPdfError('結合できませんでした。\n', error), 'error');
        } finally {
          setBusy(false); render();
        }
      }
      async function splitPdf() {
        var source = files.find(function (item) { return item.id === splitSource.value; });
        if (!source) return setStatus('分割するPDFを選択してください。', 'error');
        var ranges = splitRanges.value.split(/\r?\n/).map(function (line) { return line.trim(); }).filter(Boolean);
        if (!ranges.length) return setStatus('分割範囲を入力してください。', 'error');
        if (!window.PDFLib || !window.JSZip) return setStatus('PDFまたはZIPライブラリを読み込めませんでした。', 'error');
        setStatus('処理中... 分割PDFをZIP化しています。'); setBusy(true);
        try {
          var src = await loadPdfLibDocument(source.file);
          var zip = new JSZip();
          var base = safeBaseName($('splitBaseName').value, source.file.name.replace(/\.pdf$/i, '') + '_split');
          for (var i = 0; i < ranges.length; i++) {
            var out = await PDFLib.PDFDocument.create();
            var indexes = parseRange(ranges[i], src.getPageCount());
            var pages = await out.copyPages(src, indexes);
            pages.forEach(function (p) { out.addPage(p); });
            zip.file(base + '_' + String(i + 1).padStart(2, '0') + '.pdf', await out.save());
          }
          downloadBlob(base + '.zip', await zip.generateAsync({ type:'blob' }));
          setStatus('分割完了: ' + ranges.length + '件のPDFをZIP保存しました。', 'ok');
        } catch (error) {
          setStatus(friendlyPdfError('分割できませんでした。\n', error), 'error');
        } finally {
          setBusy(false); render();
        }
      }
      function switchMode(next) {
        mode = next;
        mergeTab.classList.toggle('active', mode === 'merge');
        splitTab.classList.toggle('active', mode === 'split');
        mergePanel.classList.toggle('active', mode === 'merge');
        splitPanel.classList.toggle('active', mode === 'split');
      }
      dropZone.addEventListener('click', function () { fileInput.click(); });
      dropZone.addEventListener('dragover', function (e) { e.preventDefault(); dropZone.classList.add('dragging'); });
      dropZone.addEventListener('dragleave', function () { dropZone.classList.remove('dragging'); });
      dropZone.addEventListener('drop', function (e) { e.preventDefault(); e.stopPropagation(); document.body.classList.remove('dragging'); dropZone.classList.remove('dragging'); addFiles(e.dataTransfer.files); });
      $('pickFiles').addEventListener('click', function () { fileInput.click(); });
      $('pickFolder').addEventListener('click', function () { folderInput.click(); });
      fileInput.addEventListener('change', function () { addFiles(fileInput.files); fileInput.value = ''; });
      folderInput.addEventListener('change', function () { addFiles(folderInput.files); folderInput.value = ''; });
      $('clearFiles').addEventListener('click', function () { files = []; splitRanges.value = ''; render(); setStatus('PDFを追加してください。'); });
      mergeTab.addEventListener('click', function () { switchMode('merge'); });
      splitTab.addEventListener('click', function () { switchMode('split'); });
      splitSource.addEventListener('change', function () { selectedFileId = splitSource.value; selectedPageIndex = 0; render(); });
      $('rotateAll90').addEventListener('click', function () { rotateSelectedPages(90); });
      $('rotateAll180').addEventListener('click', function () { rotateSelectedPages(180); });
      $('rotatePage90').addEventListener('click', rotateCurrentPage);
      $('prevPage').addEventListener('click', function () { selectedPageIndex = Math.max(0, selectedPageIndex - 1); renderPagePreview(); });
      $('nextPage').addEventListener('click', function () {
        var item = selectedItem();
        selectedPageIndex = item ? Math.min(item.pageOrder.length - 1, selectedPageIndex + 1) : 0;
        renderPagePreview();
      });
      $('mergeButton').addEventListener('click', mergePdf);
      $('splitButton').addEventListener('click', splitPdf);
      $('splitEveryPage').addEventListener('click', function () {
        var source = files.find(function (item) { return item.id === splitSource.value; });
        splitRanges.value = source ? Array.from({ length: source.pages }, function (_, i) { return String(i + 1); }).join('\n') : '';
      });
      if (!window.PDFLib || !window.pdfjsLib || !window.JSZip) setStatus('外部ライブラリの読み込みに失敗している可能性があります。ネットワークを確認してください。', 'warn');
      render();
    })();
  </script>
</body>
</html>
