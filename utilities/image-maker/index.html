<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS画像自動作成 | 便利ツール集</title>
  <meta name="description" content="タイトルや説明文からSNS投稿画像・アイキャッチ画像をCanvasで自動レイアウトし、PNG保存できる無料ツールです。">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --indigo:#4f46e5; --violet:#7c3aed; --emerald:#059669; --rose:#e11d48; --bg:#f5f6ff; --surf:#fff; --border:#e0e7ff; --text:#1e1b4b; --text2:#4c4980; --muted:#8b87c0; }
    body { font-family:'Segoe UI','Yu Gothic UI','Hiragino Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    header { background:linear-gradient(135deg,#1e1b4b,#312e81); color:#fff; }
    .hdr { max-width:1180px; margin:0 auto; padding:18px 24px; }
    .hdr-back { display:inline-flex; color:rgba(255,255,255,.68); text-decoration:none; font-size:.8rem; font-weight:800; margin-bottom:8px; }
    .hdr-title { font-size:1.45rem; font-weight:900; }
    .hdr-sub { margin-top:4px; color:rgba(255,255,255,.72); font-size:.84rem; line-height:1.7; }
    main { max-width:1180px; margin:0 auto; padding:24px; }
    .notice { margin-bottom:14px; padding:11px 13px; border:1px solid #c7d2fe; border-radius:12px; background:#eef2ff; color:#3730a3; font-size:.82rem; font-weight:800; line-height:1.6; }
    .app { display:grid; grid-template-columns:minmax(300px,370px) minmax(0,1fr); gap:16px; align-items:start; }
    .card { background:var(--surf); border:1px solid var(--border); border-radius:14px; padding:16px; box-shadow:0 2px 12px rgba(79,70,229,.07); }
    .card-title { font-size:.9rem; font-weight:900; color:#3730a3; margin-bottom:12px; }
    label { display:block; color:var(--text2); font-size:.76rem; font-weight:900; margin:10px 0 5px; }
    input, select, textarea { width:100%; border:1.5px solid var(--border); border-radius:9px; background:#fbfcff; color:var(--text); font:inherit; font-size:.86rem; font-weight:700; padding:9px 10px; }
    textarea { resize:vertical; min-height:82px; line-height:1.55; }
    input:focus, select:focus, textarea:focus { outline:3px solid rgba(79,70,229,.16); border-color:#818cf8; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .chips { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
    .chip { border:1px solid var(--border); background:#eef2ff; color:#3730a3; border-radius:999px; padding:6px 10px; font-size:.76rem; font-weight:900; cursor:pointer; }
    .btn-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    button { border:0; border-radius:9px; padding:9px 13px; font:inherit; font-size:.84rem; font-weight:900; cursor:pointer; }
    .btn-primary { color:#fff; background:linear-gradient(135deg,var(--indigo),var(--violet)); box-shadow:0 5px 14px rgba(79,70,229,.22); }
    .btn-outline { color:var(--text2); background:#eef2ff; border:1px solid var(--border); }
    .status { min-height:36px; margin-bottom:12px; padding:10px 12px; border-radius:10px; background:#eef2ff; color:#3730a3; font-size:.82rem; font-weight:850; line-height:1.55; }
    .status.warn { color:#9a3412; background:#fff7ed; border:1px solid #fed7aa; }
    .status.loading { color:#6d28d9; background:#f3e8ff; }
    .preview-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:12px; }
    .preview-card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:10px; box-shadow:0 2px 10px rgba(79,70,229,.06); }
    canvas { width:100%; height:auto; display:block; border-radius:10px; background:#fff; border:1px solid #eef2ff; }
    .preview-shot { width:100%; height:auto; display:block; border-radius:10px; border:1px solid #eef2ff; background:#fff; }
    .canvas-source { display:none; }
    .preview-actions { display:flex; gap:7px; margin-top:8px; }
    .preview-actions button { flex:1; padding:7px 8px; font-size:.74rem; }
    .score-grid { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:8px; margin-top:12px; }
    .score { border:1px solid var(--border); border-radius:10px; padding:9px; background:#fbfcff; color:var(--text2); font-size:.78rem; font-weight:800; line-height:1.45; }
    .history { display:grid; gap:7px; margin-top:10px; }
    .history button { text-align:left; color:var(--text2); background:#f8fafc; border:1px solid var(--border); font-size:.76rem; padding:8px 9px; }
    footer { text-align:center; padding:22px; color:var(--muted); font-size:.76rem; }
    @media (max-width:920px) { main { padding:18px 14px; } .hdr { padding:16px 14px; } .app { grid-template-columns:1fr; } .preview-grid { grid-template-columns:1fr; } .grid2, .score-grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<header>
  <div class="hdr">
    <a href="../" class="hdr-back">← 便利ツール集</a>
    <div class="hdr-title">SNS画像自動作成</div>
    <div class="hdr-sub">タイトルと一言から、SNS画像やアイキャッチ画像をAI風に自動レイアウトします。</div>
  </div>
</header>
<main>
  <div class="notice">このツールは画像生成AIではありません。Canvasによるテンプレート自動レイアウトで、API課金なし・ブラウザ内処理で動作します。</div>
  <div class="app">
    <section class="card">
      <div class="card-title">入力</div>
      <label for="prompt">プロンプト風入力</label>
      <textarea id="prompt" placeholder="例：仕事で使える無料ツール集。登録不要でブラウザだけで使える便利なサイトを紹介したい。"></textarea>
      <div class="btn-row">
        <button class="btn-outline" type="button" id="splitPrompt">入力からタイトル分解</button>
        <button class="btn-outline" type="button" id="sampleBtn">サンプル</button>
      </div>
      <label for="title">タイトル</label>
      <input id="title" placeholder="例：仕事で使える無料ツール集" value="仕事で使える無料ツール集">
      <label for="subtitle">サブタイトル</label>
      <textarea id="subtitle" placeholder="例：登録不要・ブラウザだけで使える">登録不要・ブラウザだけで使える。文章、変換、計算、画像までまとめて使えます。</textarea>
      <div class="grid2">
        <div><label for="useType">用途</label><select id="useType"><option>SNS投稿</option><option>ブログ</option><option>資料表紙</option><option>4コマ表紙</option><option>名言画像</option><option>ツール紹介</option></select></div>
        <div><label for="mood">雰囲気</label><select id="mood"><option>ビジネス</option><option>シンプル</option><option>ポップ</option><option>かわいい</option><option>制御屋風</option></select></div>
      </div>
      <div class="grid2">
        <div><label for="size">サイズ</label><select id="size"><option value="1080x1080">正方形 1080x1080</option><option value="1200x630">横長 1200x630</option><option value="1080x1920">縦長 1080x1920</option></select></div>
        <div><label for="palette">配色</label><select id="palette"><option>ブルー</option><option>ピンク</option><option>ミント</option><option>モノクロ</option><option>ランダム</option></select></div>
      </div>
      <div class="grid2">
        <div><label for="keyword">キーワード</label><input id="keyword" placeholder="例：AI, 仕事, PLC" value="仕事, ツール, 無料"></div>
        <div><label for="icon">アイコン</label><select id="icon"><option>⚙️</option><option>✉️</option><option>📊</option><option>💡</option><option>🧸</option><option>🤖</option><option>なし</option></select></div>
      </div>
      <div class="chips" aria-label="提案チップ">
        <button class="chip" type="button" data-mood="ビジネス">ビジネス風</button>
        <button class="chip" type="button" data-mood="かわいい">かわいい</button>
        <button class="chip" type="button" data-mood="制御屋風">制御屋風</button>
        <button class="chip" type="button" data-mood="ポップ">ポップ</button>
      </div>
      <div class="btn-row">
        <button class="btn-primary" type="button" id="generateBtn">画像を生成</button>
        <button class="btn-outline" type="button" id="regenBtn">再生成</button>
        <button class="btn-outline" type="button" id="copyTextBtn">テキストコピー</button>
      </div>
      <div class="history" id="history"></div>
    </section>

    <section>
      <div class="status" id="status">入力後、「画像を生成」を押してください。</div>
      <div class="preview-grid" id="previews"></div>
      <div class="score-grid" id="scores"></div>
    </section>
  </div>
</main>
<footer>© 2026 とある制御屋の備忘録</footer>
<script>
  (function () {
    var $ = function (id) { return document.getElementById(id); };
    var seed = 0;
    var palettes = {
      'ブルー': [['#dbeafe','#4f46e5','#0891b2','#172554'], ['#eef2ff','#2563eb','#7c3aed','#1e1b4b']],
      'ピンク': [['#fce7f3','#ec4899','#f97316','#831843'], ['#fff1f2','#e11d48','#a855f7','#4a044e']],
      'ミント': [['#ecfdf5','#059669','#0e7490','#064e3b'], ['#f0fdfa','#14b8a6','#22c55e','#134e4a']],
      'モノクロ': [['#f8fafc','#111827','#64748b','#020617'], ['#e5e7eb','#374151','#111827','#030712']]
    };
    function val(id) { return $(id).value.trim(); }
    function safeName(s) { return (s || 'sns-image').replace(/[\\/:*?"<>|]/g, '').replace(/\s+/g, '-').slice(0, 40) || 'sns-image'; }
    function pickPalette() {
      var key = val('palette');
      if (key === 'ランダム') {
        var keys = Object.keys(palettes);
        key = keys[Math.abs(seed + Date.now()) % keys.length];
      }
      var list = palettes[key] || palettes['ブルー'];
      return list[Math.abs(seed) % list.length];
    }
    function wrap(ctx, text, maxWidth, fontSize, maxLines) {
      var chars = Array.from(String(text || ''));
      var lines = [], line = '';
      chars.forEach(function (ch) {
        var test = line + ch;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line); line = ch;
        } else {
          line = test;
        }
      });
      if (line) lines.push(line);
      if (lines.length > maxLines) {
        lines = lines.slice(0, maxLines);
        while (ctx.measureText(lines[lines.length - 1] + '…').width > maxWidth && lines[lines.length - 1].length > 1) {
          lines[lines.length - 1] = lines[lines.length - 1].slice(0, -1);
        }
        lines[lines.length - 1] += '…';
      }
      return lines;
    }
    function fitFont(ctx, text, maxWidth, start, min) {
      var size = start;
      while (size > min) {
        ctx.font = '900 ' + size + 'px "Segoe UI", "Yu Gothic UI", sans-serif';
        if (wrap(ctx, text, maxWidth, size, 4).length <= 4) break;
        size -= 4;
      }
      return size;
    }
    function drawPattern(ctx, w, h, colors, variant) {
      var g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, colors[0]); g.addColorStop(1, '#ffffff');
      ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
      ctx.globalAlpha = .16;
      ctx.fillStyle = colors[1];
      for (var i = 0; i < 10; i++) {
        var x = ((i * 173 + variant * 97) % w);
        var y = ((i * 211 + variant * 61) % h);
        ctx.beginPath(); ctx.arc(x, y, Math.max(w, h) * (0.035 + (i % 3) * .015), 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
    function drawCanvas(canvas, variant) {
      var size = val('size').split('x').map(Number), w = size[0], h = size[1];
      if (!w || !h) { w = 1080; h = 1080; }
      canvas.width = w; canvas.height = h;
      var ctx = canvas.getContext('2d');
      if (!ctx) throw new Error('Canvasを利用できません。ブラウザ設定を確認してください。');
      var colors = pickPalette();
      var title = val('title') || 'タイトルを入力してください';
      var subtitle = val('subtitle') || 'サブタイトルを入力すると画像に反映されます';
      var keyword = val('keyword');
      var icon = val('icon') === 'なし' ? '' : val('icon');
      drawPattern(ctx, w, h, colors, variant);
      drawIllustration(ctx, w, h, colors, variant);
      var pad = Math.round(Math.min(w, h) * .075);
      var cardX = variant % 2 ? pad : pad * 1.25;
      var cardY = variant === 2 ? pad * 1.45 : pad;
      var cardW = w - cardX * 2;
      var cardH = h - cardY * 2;
      ctx.fillStyle = 'rgba(255,255,255,.84)';
      roundRect(ctx, cardX, cardY, cardW, cardH, Math.round(Math.min(w,h) * .035));
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.95)'; ctx.lineWidth = Math.max(4, w * .004); ctx.stroke();
      ctx.fillStyle = colors[1];
      roundRect(ctx, cardX + pad * .45, cardY + pad * .45, Math.max(160, w * .2), Math.max(44, h * .035), 999);
      ctx.fill();
      ctx.fillStyle = '#fff'; ctx.font = '800 ' + Math.max(24, Math.round(w * .025)) + 'px "Segoe UI", sans-serif'; ctx.textBaseline = 'middle';
      ctx.fillText(val('useType') || 'SNS投稿', cardX + pad * .72, cardY + pad * .45 + Math.max(44, h * .035) / 2);
      if (icon) {
        ctx.font = Math.round(Math.min(w,h) * .105) + 'px "Segoe UI Emoji", sans-serif';
        ctx.textAlign = 'right'; ctx.fillText(icon, cardX + cardW - pad * .45, cardY + pad * 1.25);
        ctx.textAlign = 'left';
      }
      var titleSize = fitFont(ctx, title, cardW - pad * 1.3, Math.round(Math.min(w,h) * .085), Math.round(Math.min(w,h) * .045));
      ctx.font = '900 ' + titleSize + 'px "Segoe UI", "Yu Gothic UI", sans-serif';
      ctx.fillStyle = colors[3]; ctx.textBaseline = 'top';
      var titleLines = wrap(ctx, title, cardW - pad * 1.3, titleSize, 4);
      var titleY = cardY + cardH * (variant === 1 ? .31 : .27);
      titleLines.forEach(function (line, i) { ctx.fillText(line, cardX + pad * .65, titleY + i * titleSize * 1.18); });
      var subSize = Math.max(26, Math.round(Math.min(w,h) * .034));
      ctx.font = '750 ' + subSize + 'px "Segoe UI", "Yu Gothic UI", sans-serif';
      ctx.fillStyle = colors[2];
      wrap(ctx, subtitle, cardW - pad * 1.3, subSize, 3).forEach(function (line, i) { ctx.fillText(line, cardX + pad * .68, titleY + titleLines.length * titleSize * 1.2 + pad * .45 + i * subSize * 1.35); });
      var tags = keyword.split(/[、,\s]+/).filter(Boolean).slice(0, 4);
      if (tags.length) {
        var tx = cardX + pad * .65, ty = cardY + cardH - pad * 1.15;
        ctx.font = '800 ' + Math.max(22, Math.round(w * .022)) + 'px "Segoe UI", sans-serif';
        tags.forEach(function (tag) {
          var tw = ctx.measureText('#' + tag).width + pad * .46;
          ctx.fillStyle = colors[0]; roundRect(ctx, tx, ty, tw, Math.max(40, h * .035), 999); ctx.fill();
          ctx.fillStyle = colors[1]; ctx.fillText('#' + tag, tx + pad * .22, ty + Math.max(8, h * .008));
          tx += tw + pad * .18;
        });
      }
    }
    function drawIllustration(ctx, w, h, colors, variant) {
      var scale = Math.min(w, h);
      var cx = w * (variant % 2 ? .78 : .22);
      var cy = h * (variant === 2 ? .22 : .78);
      ctx.save();
      ctx.globalAlpha = .9;
      ctx.fillStyle = colors[1];
      roundRect(ctx, cx - scale * .09, cy - scale * .08, scale * .18, scale * .16, scale * .03);
      ctx.fill();
      ctx.fillStyle = colors[2];
      ctx.beginPath();
      ctx.arc(cx + scale * .1, cy - scale * .09, scale * .06, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = colors[3];
      ctx.lineWidth = Math.max(6, scale * .01);
      for (var i = 0; i < 4; i++) {
        ctx.beginPath();
        ctx.moveTo(cx - scale * .14 + i * scale * .08, cy + scale * .12);
        ctx.lineTo(cx - scale * .09 + i * scale * .08, cy + scale * .19);
        ctx.stroke();
      }
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      ctx.font = '900 ' + Math.round(scale * .055) + 'px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('AI', cx, cy);
      ctx.textAlign = 'left';
      ctx.restore();
    }
    function roundRect(ctx, x, y, w, h, r) {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath(); ctx.moveTo(x + r, y); ctx.arcTo(x + w, y, x + w, y + h, r); ctx.arcTo(x + w, y + h, x, y + h, r); ctx.arcTo(x, y + h, x, y, r); ctx.arcTo(x, y, x + w, y, r); ctx.closePath();
    }
    function makeScores() {
      var titleLen = Array.from(val('title')).length, subLen = Array.from(val('subtitle')).length;
      var sizeOk = titleLen <= 32 ? '文字量OK' : 'タイトル長め';
      var sns = val('size') === '1080x1080' ? 'SNS向き' : '用途別サイズ';
      var read = subLen <= 70 ? '読みやすさ良好' : '説明文長め';
      $('scores').innerHTML = '<div class="score">' + sizeOk + '<br>タイトル ' + titleLen + '文字</div><div class="score">' + sns + '<br>' + val('size') + '</div><div class="score">' + read + '<br>説明 ' + subLen + '文字</div>';
      $('status').className = titleLen > 44 || subLen > 100 ? 'status warn' : 'status';
      $('status').textContent = titleLen > 44 || subLen > 100 ? '長文のため一部省略される可能性があります。' : '3パターン生成しました。PNG保存できます。';
    }
    function saveHistory() {
      var item = { title: val('title'), subtitle: val('subtitle'), keyword: val('keyword'), mood: val('mood'), palette: val('palette'), size: val('size') };
      var list = [];
      try { list = JSON.parse(localStorage.getItem('image-maker-history') || '[]'); } catch (e) { list = []; }
      list = list.filter(function (x) { return x.title !== item.title; });
      list.unshift(item);
      try { localStorage.setItem('image-maker-history', JSON.stringify(list.slice(0, 5))); } catch (e) {}
      renderHistory();
    }
    function renderHistory() {
      var list = [];
      try { list = JSON.parse(localStorage.getItem('image-maker-history') || '[]'); } catch (e) { list = []; }
      $('history').innerHTML = list.length ? '<label>生成履歴</label>' + list.map(function (item, i) { return '<button type="button" data-history="' + i + '">' + item.title + '</button>'; }).join('') : '';
    }
    function generate() {
      $('status').className = 'status loading';
      $('status').textContent = '画像レイアウトを作成中...';
      setTimeout(function () {
        try {
          $('previews').innerHTML = '';
          for (var i = 0; i < 3; i++) {
            var wrap = document.createElement('div');
            wrap.className = 'preview-card';
            wrap.innerHTML = '<img class="preview-shot" alt="生成画像プレビュー"><canvas class="canvas-source"></canvas><div class="preview-actions"><button class="btn-outline" type="button" data-save="' + i + '">PNG保存</button><button class="btn-outline" type="button" data-redraw="' + i + '">この案を再描画</button></div>';
            $('previews').appendChild(wrap);
            var canvas = wrap.querySelector('canvas');
            drawCanvas(canvas, seed + i);
            wrap.querySelector('img').src = canvas.toDataURL('image/png');
          }
          makeScores();
          saveHistory();
        } catch (e) {
          $('status').className = 'status warn';
          $('status').textContent = '画像を作成できませんでした: ' + e.message;
        }
      }, 480);
    }
    document.addEventListener('click', function (e) {
      var save = e.target.closest('[data-save]');
      if (save) {
        var canvas = save.closest('.preview-card').querySelector('canvas');
        var img = save.closest('.preview-card').querySelector('img');
        var a = document.createElement('a');
        a.href = img && img.src ? img.src : canvas.toDataURL('image/png');
        a.download = safeName(val('title')) + '.png';
        a.click();
      }
      var redraw = e.target.closest('[data-redraw]');
      if (redraw) {
        try {
          var card = redraw.closest('.preview-card');
          var canvas = card.querySelector('canvas');
          drawCanvas(canvas, ++seed);
          card.querySelector('img').src = canvas.toDataURL('image/png');
          $('status').className = 'status';
          $('status').textContent = 'この案を再描画しました。';
        } catch (e) {
          $('status').className = 'status warn';
          $('status').textContent = '再描画できませんでした: ' + e.message;
        }
      }
      var chip = e.target.closest('[data-mood]');
      if (chip) { $('mood').value = chip.getAttribute('data-mood'); generate(); }
      var hist = e.target.closest('[data-history]');
      if (hist) {
        var list = [];
        try { list = JSON.parse(localStorage.getItem('image-maker-history') || '[]'); } catch (e) { list = []; }
        var item = list[Number(hist.getAttribute('data-history'))];
        if (item) { ['title','subtitle','keyword','mood','palette','size'].forEach(function (id) { $(id).value = item[id] || $(id).value; }); generate(); }
      }
    });
    $('splitPrompt').addEventListener('click', function () {
      var text = val('prompt');
      if (!text) return;
      $('title').value = text.slice(0, 30).replace(/[。,.、]$/, '');
      $('subtitle').value = text.slice(30).replace(/^[。,.、\s]+/, '') || '登録不要・ブラウザだけで使える';
    });
    $('sampleBtn').addEventListener('click', function () {
      $('prompt').value = '仕事で使える無料ツール集。登録不要でブラウザだけで使える便利なサイトを紹介したい。';
      $('title').value = '仕事で使える無料ツール集';
      $('subtitle').value = '登録不要・ブラウザだけで使える。文章、変換、計算、画像までまとめて使えます。';
      $('keyword').value = '仕事, ツール, 無料'; $('mood').value = 'ビジネス'; $('palette').value = 'ブルー'; $('icon').value = '⚙️'; generate();
    });
    $('generateBtn').addEventListener('click', generate);
    $('regenBtn').addEventListener('click', function () { seed++; generate(); });
    $('copyTextBtn').addEventListener('click', function () {
      navigator.clipboard.writeText([val('title'), val('subtitle'), val('keyword')].filter(Boolean).join('\n')).then(function () { $('status').textContent = '画像用テキストをコピーしました。'; });
    });
    ['title','subtitle','keyword','useType','mood','size','palette','icon'].forEach(function (id) { $(id).addEventListener('change', generate); });
    renderHistory();
    generate();
  })();
</script>
</body>
</html>
