<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNS画像自動作成｜公開ツール一覧</title>
  <meta name="description" content="タイトルと説明文からSNS画像をCanvasで作成し、PNG保存できます。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/utilities/image-maker/">
  <style>
    *,*::before,*::after{box-sizing:border-box}body{margin:0;font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif;background:#f5f6ff;color:#1e1b4b}header,main{width:min(1180px,calc(100% - 24px));margin:auto}header{padding:20px 0 12px}a{color:#4f46e5;font-weight:800;text-decoration:none}h1{font-size:clamp(1.55rem,4vw,2.3rem);margin:12px 0 6px}.lead{color:#64748b;line-height:1.6}.app{display:grid;grid-template-columns:minmax(300px,370px) minmax(0,1fr);gap:16px;margin:18px 0 30px}.card{background:#fff;border:1px solid #e0e7ff;border-radius:12px;padding:16px;box-shadow:0 10px 24px rgba(79,70,229,.08)}label{display:block;font-size:.78rem;font-weight:900;color:#4c4980;margin:10px 0 5px}input,select,textarea{width:100%;border:1.5px solid #e0e7ff;border-radius:9px;padding:9px 10px;font:inherit}textarea{min-height:82px;resize:vertical;line-height:1.55}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}button{border:0;border-radius:9px;padding:9px 13px;font:inherit;font-size:.84rem;font-weight:900;cursor:pointer;background:#eef2ff;color:#312e81}.primary{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}.status{padding:10px 12px;border-radius:10px;background:#eef2ff;color:#3730a3;font-weight:850;line-height:1.5;margin-bottom:12px}.status.ok{background:#ecfdf5;color:#047857}.status.error{background:#fff1f2;color:#be123c}.previews{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.preview{background:#fff;border:1px solid #e0e7ff;border-radius:12px;padding:10px}.preview img{display:block;width:100%;height:auto;border:1px solid #eef2ff;border-radius:10px;background:#fff}.preview canvas{display:none}.actions{display:flex;gap:8px;margin-top:8px}.actions button{flex:1}.score{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:12px}.score div{background:#fff;border:1px solid #e0e7ff;border-radius:10px;padding:9px;font-size:.8rem;font-weight:800;color:#4c4980}@media(max-width:920px){header,main{width:min(100% - 16px,1180px)}.app,.grid2,.previews,.score{grid-template-columns:1fr}button{min-height:38px}}
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="SNS画像自動作成｜公開ツール一覧">
  <meta property="og:description" content="タイトルと説明文からSNS画像をCanvasで作成し、PNG保存できます。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/utilities/image-maker/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <header>
    <a href="../">← 公開ツール一覧</a>
    <h1>SNS画像自動作成</h1>
    <p class="lead">CanvasでSNS用の画像テンプレートを作成します。正方形、横長、縦長の出力サイズに対応しています。</p>
  </header>
  <main>
    <div class="app">
      <section class="card">
        <label for="prompt">入力メモ</label><textarea id="prompt" placeholder="例: 仕事で使える無料ツール集。登録不要で使える便利なサイトを紹介したい。"></textarea>
        <div class="row"><button id="splitPrompt" type="button">入力から分解</button><button id="sampleBtn" type="button">サンプル</button></div>
        <label for="title">タイトル</label><input id="title" value="仕事で使える無料ツール集">
        <label for="subtitle">説明文</label><textarea id="subtitle">登録不要・ブラウザだけで使える。文章、変換、計算、画像までまとめて使えます。</textarea>
        <div class="grid2">
          <div><label for="useType">用途</label><select id="useType"><option>SNS投稿</option><option>ブログ</option><option>資料表紙</option><option>ツール紹介</option></select></div>
          <div><label for="mood">雰囲気</label><select id="mood"><option>ビジネス</option><option>シンプル</option><option>ポップ</option><option>かわいい</option><option>制御屋風</option></select></div>
        </div>
        <div class="grid2">
          <div><label for="size">サイズ</label><select id="size"><option value="1080x1080">正方形 1080x1080</option><option value="1200x630">横長 1200x630</option><option value="1080x1920">縦長 1080x1920</option></select></div>
          <div><label for="palette">配色</label><select id="palette"><option>ブルー</option><option>ピンク</option><option>ミント</option><option>モノクロ</option><option>ランダム</option></select></div>
        </div>
        <label for="keyword">キーワード</label><input id="keyword" value="仕事, ツール, 無料">
        <div class="row"><button class="primary" id="generateBtn" type="button">画像を生成</button><button id="regenBtn" type="button">再生成</button><button id="copyTextBtn" type="button">テキストコピー</button></div>
      </section>
      <section>
        <div class="status" id="status">画像を生成してください。</div>
        <div class="previews" id="previews"></div>
        <div class="score" id="score"></div>
      </section>
    </div>
  </main>
  <script>
    (function(){
      var $=function(id){return document.getElementById(id)}, seed=0;
      var palettes={ブルー:['#dbeafe','#2563eb','#0891b2','#172554'],ピンク:['#fce7f3','#ec4899','#f97316','#831843'],ミント:['#ecfdf5','#059669','#0e7490','#064e3b'],モノクロ:['#f8fafc','#111827','#64748b','#020617']};
      function val(id){return $(id).value.trim()} function safe(s){return(s||'sns-image').replace(/[\\/:*?"<>|]/g,'').replace(/\s+/g,'-').slice(0,40)||'sns-image'}
      function colors(){var k=val('palette'); if(k==='ランダム'){var keys=Object.keys(palettes);k=keys[Math.floor(Math.random()*keys.length)]} return palettes[k]||palettes.ブルー}
      function wrap(ctx,text,maxWidth,fontSize,maxLines){var lines=[],line='';Array.from(String(text||'')).forEach(function(ch){var t=line+ch;if(ctx.measureText(t).width>maxWidth&&line){lines.push(line);line=ch}else line=t});if(line)lines.push(line);if(lines.length>maxLines){lines=lines.slice(0,maxLines);while(ctx.measureText(lines[lines.length-1]+'...').width>maxWidth&&lines[lines.length-1].length>1)lines[lines.length-1]=lines[lines.length-1].slice(0,-1);lines[lines.length-1]+='...'}return lines}
      function fit(ctx,text,max,start,min){var s=start;while(s>min){ctx.font='900 '+s+'px "Yu Gothic UI", sans-serif';if(wrap(ctx,text,max,s,4).length<=4)break;s-=4}return s}
      function round(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath()}
      function draw(canvas,variant){var size=val('size').split('x').map(Number),w=size[0]||1080,h=size[1]||1080,c=colors(),ctx=canvas.getContext('2d');canvas.width=w;canvas.height=h;if(!ctx)throw new Error('Canvasを利用できません。');var g=ctx.createLinearGradient(0,0,w,h);g.addColorStop(0,c[0]);g.addColorStop(1,'#fff');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.globalAlpha=.14;ctx.fillStyle=c[1];for(var i=0;i<10;i++){ctx.beginPath();ctx.arc((i*173+variant*91)%w,(i*211+variant*53)%h,Math.max(w,h)*(.04+(i%3)*.015),0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1;var pad=Math.round(Math.min(w,h)*.075),x=pad,y=pad,cw=w-pad*2,ch=h-pad*2;ctx.fillStyle='rgba(255,255,255,.86)';round(ctx,x,y,cw,ch,Math.round(Math.min(w,h)*.035));ctx.fill();ctx.strokeStyle='rgba(255,255,255,.9)';ctx.lineWidth=Math.max(4,w*.004);ctx.stroke();ctx.fillStyle=c[1];round(ctx,x+pad*.45,y+pad*.45,Math.max(160,w*.2),Math.max(44,h*.035),999);ctx.fill();ctx.fillStyle='#fff';ctx.font='800 '+Math.max(24,Math.round(w*.025))+'px sans-serif';ctx.textBaseline='middle';ctx.fillText(val('useType')||'SNS投稿',x+pad*.7,y+pad*.45+Math.max(44,h*.035)/2);var title=val('title')||'タイトルを入力してください',sub=val('subtitle')||'';var ts=fit(ctx,title,cw-pad*1.3,Math.round(Math.min(w,h)*.085),Math.round(Math.min(w,h)*.045));ctx.fillStyle=c[3];ctx.textBaseline='top';ctx.font='900 '+ts+'px "Yu Gothic UI", sans-serif';var yy=y+ch*.28;wrap(ctx,title,cw-pad*1.3,ts,4).forEach(function(line,i){ctx.fillText(line,x+pad*.65,yy+i*ts*1.18)});var ss=Math.max(26,Math.round(Math.min(w,h)*.034));ctx.font='750 '+ss+'px "Yu Gothic UI", sans-serif';ctx.fillStyle=c[2];wrap(ctx,sub,cw-pad*1.3,ss,3).forEach(function(line,i){ctx.fillText(line,x+pad*.68,yy+ts*4.15+i*ss*1.35)});ctx.font='800 '+Math.max(22,Math.round(w*.022))+'px sans-serif';var tx=x+pad*.65,ty=y+ch-pad*1.15;val('keyword').split(/[,\s、]+/).filter(Boolean).slice(0,4).forEach(function(tag){var tw=ctx.measureText('#'+tag).width+pad*.45;ctx.fillStyle=c[0];round(ctx,tx,ty,tw,Math.max(40,h*.035),999);ctx.fill();ctx.fillStyle=c[1];ctx.fillText('#'+tag,tx+pad*.2,ty+Math.max(8,h*.008));tx+=tw+pad*.16})}
      function generate(){try{$('status').textContent='処理中...';$('previews').innerHTML='';for(var i=0;i<3;i++){var card=document.createElement('div');card.className='preview';card.innerHTML='<img alt="生成画像"><canvas></canvas><div class="actions"><button type="button" data-save>PNG保存</button><button type="button" data-redraw>再描画</button></div>';$('previews').appendChild(card);var canvas=card.querySelector('canvas');draw(canvas,seed+i);card.querySelector('img').src=canvas.toDataURL('image/png')}$('status').textContent='3パターン生成しました。';$('status').className='status ok';$('score').innerHTML='<div>サイズ<br><strong>'+val('size')+'</strong></div><div>タイトル<br><strong>'+Array.from(val('title')).length+'文字</strong></div><div>保存<br><strong>PNG対応</strong></div>'}catch(e){$('status').textContent='画像を生成できませんでした: '+e.message;$('status').className='status error'}}
      document.addEventListener('click',function(e){var save=e.target.closest('[data-save]'),redraw=e.target.closest('[data-redraw]');if(save){var img=save.closest('.preview').querySelector('img'),a=document.createElement('a');a.href=img.src;a.download=safe(val('title'))+'.png';a.click()}if(redraw){var card=redraw.closest('.preview'),canvas=card.querySelector('canvas');draw(canvas,++seed);card.querySelector('img').src=canvas.toDataURL('image/png');$('status').textContent='再描画しました。';$('status').className='status ok'}});
      $('splitPrompt').addEventListener('click',function(){var t=val('prompt');if(!t)return;$('title').value=t.slice(0,30).replace(/[。、,.]$/,'');$('subtitle').value=t.slice(30).replace(/^[。、,.\s]+/,'')||$('subtitle').value;generate()});$('sampleBtn').addEventListener('click',function(){$('prompt').value='仕事で使える無料ツール集。登録不要で使える便利なサイトを紹介したい。';$('title').value='仕事で使える無料ツール集';$('subtitle').value='登録不要・ブラウザだけで使える。文章、変換、計算、画像までまとめて使えます。';$('keyword').value='仕事,ツール,無料';generate()});$('generateBtn').addEventListener('click',generate);$('regenBtn').addEventListener('click',function(){seed++;generate()});$('copyTextBtn').addEventListener('click',function(){navigator.clipboard.writeText([val('title'),val('subtitle'),val('keyword')].join('\n')).then(function(){$('status').textContent='テキストをコピーしました。';$('status').className='status ok'},function(){$('status').textContent='コピーできませんでした。';$('status').className='status error'})});['title','subtitle','keyword','useType','mood','size','palette'].forEach(function(id){$(id).addEventListener('change',generate)});generate();
    })();
  </script>
</body>
</html>
