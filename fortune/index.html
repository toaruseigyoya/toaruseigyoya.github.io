<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>占いツール集 | 今日もあいネコ</title>
  <style>
    *,*::before,*::after{box-sizing:border-box}body{margin:0;background:#fff7fb;color:#2b123c;font-family:"Yu Gothic UI","Meiryo",system-ui,sans-serif}main{width:min(1060px,calc(100% - 22px));margin:auto;padding:24px 0 40px}a{color:#7c3aed;text-decoration:none;font-weight:850}h1{font-size:clamp(1.7rem,4vw,2.7rem);margin:12px 0 6px}.lead{color:#6b4a78;line-height:1.7}.grid{display:grid;grid-template-columns:340px minmax(0,1fr);gap:16px;margin-top:18px}.menu,.result{background:#fff;border:1px solid #f5d0fe;border-radius:14px;padding:16px;box-shadow:0 12px 28px rgba(168,85,247,.08)}.menu{display:grid;gap:8px;align-content:start}.tab{border:0;border-radius:10px;padding:11px 12px;background:#fdf4ff;color:#701a75;text-align:left;font:inherit;font-weight:900;cursor:pointer}.tab.active{background:linear-gradient(135deg,#a855f7,#ec4899);color:#fff}label{display:block;margin:10px 0 5px;font-size:.8rem;font-weight:900;color:#7e3a8a}input,select,textarea{width:100%;border:1px solid #f0abfc;border-radius:10px;padding:10px;font:inherit}textarea{min-height:90px}button.run{margin-top:12px;border:0;border-radius:10px;padding:11px 14px;background:#7c3aed;color:#fff;font:inherit;font-weight:950;cursor:pointer}.box{margin-top:14px;background:#fdf4ff;border:1px solid #f5d0fe;border-radius:12px;padding:14px;line-height:1.8;font-weight:750}.score{font-size:2rem;font-weight:1000;color:#db2777}@media(max-width:780px){.grid{grid-template-columns:1fr}}
  </style>
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="占いツール集 | 今日もあいネコ">
  <meta property="og:description" content="今日もあいネコのページです。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/fortune/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  
  
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
<main>
  <a href="../">← ホームへ戻る</a>
  <h1>占いツール集</h1>
  <p class="lead">今日の運勢、相性、タロット風、名前、仕事運をまとめた軽量占いページです。入力内容から毎回同じ条件で結果を作るので、メモ代わりにも使えます。</p>
  <div class="grid">
    <nav class="menu" id="menu"></nav>
    <section class="result">
      <h2 id="title"></h2>
      <div id="form"></div>
      <button class="run" id="run">占う</button>
      <div class="box" id="out">左から占いを選んでください。</div>
    </section>
  </div>
</main>
<script>
const types=[
 ['today','今日の運勢','名前','今日の流れ、注意点、ラッキー行動を出します。'],
 ['love','相性占い','2人の名前','相性スコアと関係を良くする一言を出します。'],
 ['tarot','タロット風','相談内容','3枚引き風に過去・現在・未来を出します。'],
 ['name','名前占い','名前','名前の響きから強みと向いている行動を出します。'],
 ['work','仕事運','気になる仕事','進め方、注意点、今日の一手を出します。']
];let cur=types[0];function h(s){let n=0;for(let ch of String(s||'未入力'))n=(n*31+ch.charCodeAt(0))>>>0;return n}function pick(a,n){return a[Math.abs(Number(n)||0)%a.length]}const words=['大吉','中吉','小吉','吉','末吉'],acts=['早めに連絡する','机を片付ける','10分だけ先に進める','人に相談する','一度寝かせて見直す'],warn=['焦りすぎ','言い切りすぎ','後回し','確認不足','情報の抱え込み'];function renderMenu(){menu.innerHTML='';types.forEach(t=>{let b=document.createElement('button');b.className='tab'+(t===cur?' active':'');b.textContent=t[1];b.onclick=()=>{cur=t;render()};menu.appendChild(b)})}function render(){renderMenu();title.textContent=cur[1];form.innerHTML=cur[0]==='love'?'<label>あなたの名前</label><input id="a"><label>相手の名前</label><input id="b">':'<label>'+cur[2]+'</label><textarea id="a"></textarea>';out.textContent=cur[3]}function result(){let a=((document.getElementById('a')||{}).value||'未入力').trim()||'未入力',b=((document.getElementById('b')||{}).value||'').trim(),n=h(cur[0]+a+b+new Date().toDateString());if(cur[0]==='love'){let s=55+n%46;out.innerHTML='<div class="score">'+s+'%</div>相性は「'+pick(words,n)+'」。距離を縮める鍵は、'+pick(acts,n>>>3)+'ことです。注意点は'+pick(warn,n>>>6)+'。'}else if(cur[0]==='tarot'){let cards=['太陽','星','月','力','節制','運命の輪','隠者'];out.innerHTML='過去: '+pick(cards,n)+'<br>現在: '+pick(cards,n>>>3)+'<br>未来: '+pick(cards,n>>>6)+'<br>助言: '+pick(acts,n>>>9)+'。'}else{out.innerHTML='<div class="score">'+pick(words,n)+'</div>今日の鍵は「'+pick(acts,n>>>4)+'」。注意点は「'+pick(warn,n>>>7)+'」。ラッキーカラーは '+pick(['青','緑','白','金','紫','赤'],n>>>10)+' です。'}}run.onclick=result;render();
</script>
</body>
</html>
