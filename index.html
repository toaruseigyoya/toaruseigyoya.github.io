<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今日もあいネコ | 子育てとAI活用のメモ</title>
  <meta name="description" content="AI×ネコで、あいネコ。仕事と子育てに奮闘中。子育ての日常とAI関連を中心に発信予定。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="今日もあいネコ">
  <meta property="og:description" content="子育ての日常と、最近話題のAI関連を中心に発信予定。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --mint:#36c49f; --pink:#ff8cb3; --sky:#5fb5ff; --lemon:#ffd76a;
      --ink:#273044; --sub:#65708a; --bg:#fff8ee; --paper:#ffffff; --line:#f0dccb;
      --shadow:0 14px 38px rgba(85,70,50,.12);
    }
    body { font-family:'Segoe UI','Yu Gothic UI','Hiragino Sans',sans-serif; background:linear-gradient(180deg,#fff7df,#f7fbff 58%,#fff7fb); color:var(--ink); line-height:1.7; min-height:100vh; }
    .site-banner { max-width:1120px; margin:18px auto 0; padding:0 20px; }
    .site-banner img { width:100%; max-height:220px; object-fit:cover; border-radius:18px; border:3px solid #fff; box-shadow:var(--shadow); display:block; }
    .page { max-width:1120px; margin:0 auto; padding:22px 20px 70px; display:grid; grid-template-columns:310px minmax(0,1fr); gap:24px; align-items:start; }
    .profile, .links { background:rgba(255,255,255,.86); border:1px solid rgba(255,255,255,.9); border-radius:18px; box-shadow:var(--shadow); }
    .profile { position:sticky; top:18px; padding:24px; }
    .avatar { width:128px; height:128px; border-radius:28px; overflow:hidden; background:#fff; border:4px solid #fff; box-shadow:0 10px 26px rgba(255,140,179,.25); margin-bottom:16px; }
    .avatar img { width:100%; height:100%; object-fit:cover; display:block; transform:scale(1.08); }
    .profile-name { font-size:1.35rem; font-weight:900; letter-spacing:.02em; margin-bottom:12px; }
    .profile-bio { color:var(--sub); font-size:.92rem; line-height:1.95; }
    .links { padding:16px; display:grid; gap:10px; }
    .link-card { display:grid; grid-template-columns:54px minmax(0,170px) minmax(0,1fr); gap:14px; align-items:center; min-height:74px; padding:12px 14px; border-radius:14px; background:#fff; border:1px solid var(--line); color:var(--ink); text-decoration:none; transition:transform .15s, box-shadow .15s, border-color .15s; }
    .link-card:hover { transform:translateY(-2px); border-color:rgba(54,196,159,.45); box-shadow:0 10px 24px rgba(54,196,159,.12); }
    .link-icon { width:48px; height:48px; border-radius:15px; display:grid; place-items:center; font-size:1.45rem; font-weight:900; color:#fff; }
    .i-tools{background:linear-gradient(135deg,var(--mint),#75dfc5)} .i-check{background:linear-gradient(135deg,#9aa6b2,#c8d0d7)}
    .i-util{background:linear-gradient(135deg,var(--sky),#9ed2ff)} .i-task{background:linear-gradient(135deg,#7c83ff,#b5b8ff)}
    .i-game{background:linear-gradient(135deg,var(--pink),#ffc1d6)} .i-fortune{background:linear-gradient(135deg,var(--lemon),#ffb84d)}
    .link-title { font-size:1rem; font-weight:900; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .link-desc { color:var(--sub); font-size:.84rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    footer { text-align:center; color:#8a7890; font-size:.78rem; padding:24px; }
    @media (max-width:780px) {
      .page { grid-template-columns:1fr; padding-inline:14px; }
      .profile { position:static; }
      .link-card { grid-template-columns:48px 1fr; }
      .link-desc { grid-column:2; white-space:normal; }
    }
  </style>
</head>
<body>
  <div class="site-banner"><img src="assets/images/aineko-banner.png" alt="今日もあいネコ"></div>
  <main class="page">
    <aside class="profile">
      <div class="avatar"><img src="assets/images/aineko-profile.png" alt="今日もあいネコ"></div>
      <h1 class="profile-name">今日もあいネコ</h1>
      <p class="profile-bio">AI×ネコで、あいネコ。<br>仕事と子育てに奮闘中。<br>4歳＆1歳に癒される日々。<br>子育ての日常と、最近話題のAI関連を中心に発信予定。</p>
    </aside>
    <section class="links" aria-label="コンテンツ一覧">
      <a class="link-card" href="https://toaruseigyoya.github.io/tools/">
        <span class="link-icon i-tools">🔧</span><span class="link-title">汎用ツール集</span><span class="link-desc">Word編集などの便利ツールを無料公開</span>
      </a>
      <a class="link-card" href="https://toaruseigyoya.github.io/tools/checking/">
        <span class="link-icon i-check">🧪</span><span class="link-title">汎用ツール集(動作確認中)</span><span class="link-desc">旧ツール群の動作確認用ページ</span>
      </a>
      <a class="link-card" href="https://toaruseigyoya.github.io/utilities/">
        <span class="link-icon i-util">📄</span><span class="link-title">便利ツール集</span><span class="link-desc">PDF・画像・文章作成などの実用ツール</span>
      </a>
      <a class="link-card" href="https://toaruseigyoya.github.io/tasks/">
        <span class="link-icon i-task">✓</span><span class="link-title">タスク管理</span><span class="link-desc">グループ・期限・進捗つきタスク管理アプリ</span>
      </a>
      <a class="link-card" href="https://toaruseigyoya.github.io/games/">
        <span class="link-icon i-game">🎮</span><span class="link-title">無料ゲーム</span><span class="link-desc">ブラウザで遊べるパズル・カード・ボードゲーム</span>
      </a>
      <a class="link-card" href="https://toaruseigyoya.github.io/fortune/">
        <span class="link-icon i-fortune">占</span><span class="link-title">占い</span><span class="link-desc">今日の運勢や相性を気軽にチェック</span>
      </a>
    </section>
  </main>
  <footer>© 2026 今日もあいネコ</footer>
</body>
</html>
