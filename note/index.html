<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI活用シリーズ | 今日もあいネコ</title>
  <meta name="description" content="今日もあいネコのnote記事シリーズ紹介ページ。AI時代を生き抜くために、AI活用や仕事と子育ての試行錯誤を読みものとして整理します。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/note/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="今日もあいネコ">
  <meta property="og:title" content="AI活用シリーズ | 今日もあいネコ">
  <meta property="og:description" content="AI時代を生き抜くために。note記事として育てるAI活用シリーズの入口です。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/note/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/aineko-banner.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --mint:#36c49f; --sky:#5fb5ff; --pink:#ff8cb3; --ink:#273044; --sub:#65708a; --line:#f0dccb; --bg:#fff8ee; --shadow:0 14px 38px rgba(85,70,50,.12); }
    body { font-family:'Segoe UI','Yu Gothic UI','Hiragino Sans',sans-serif; background:linear-gradient(180deg,#fff7df,#f7fbff 58%,#fff7fb); color:var(--ink); line-height:1.75; min-height:100vh; }
    .site-banner { max-width:1120px; margin:18px auto 0; padding:0 20px; }
    .site-banner img { width:100%; max-height:300px; object-fit:contain; background:#fff; border-radius:18px; border:3px solid #fff; box-shadow:var(--shadow); display:block; }
    main { max-width:980px; margin:0 auto; padding:24px 20px 70px; }
    .crumb { display:inline-flex; min-height:40px; align-items:center; color:#0f7f68; font-size:.9rem; font-weight:900; text-decoration:none; margin-bottom:14px; }
    .hero, .section { background:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.9); border-radius:18px; box-shadow:var(--shadow); padding:22px; margin-bottom:16px; }
    h1 { font-size:clamp(1.8rem,5vw,2.8rem); line-height:1.2; letter-spacing:0; margin-bottom:10px; }
    .lead { color:var(--sub); max-width:720px; font-size:1rem; }
    .series-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:12px; margin-top:14px; }
    .series-card { display:flex; flex-direction:column; gap:10px; min-height:170px; padding:18px; border:1px solid var(--line); border-radius:14px; background:#fff; color:var(--ink); text-decoration:none; }
    .series-card h2 { font-size:1.1rem; line-height:1.45; }
    .series-card p { color:var(--sub); font-size:.92rem; flex:1; }
    .status { align-self:flex-start; border-radius:999px; background:#eaf8f3; color:#0f7f68; border:1px solid #c8efe3; padding:4px 10px; font-size:.78rem; font-weight:900; }
    .slot-list { display:grid; gap:8px; margin-top:12px; }
    .slot { border-left:4px solid var(--mint); background:#fff; border-radius:10px; padding:10px 12px; color:var(--sub); font-weight:800; }
    footer { text-align:center; color:#8a7890; font-size:.9rem; padding:24px; }
    @media (max-width:700px) { .site-banner, main { padding-inline:14px; } .hero, .section { padding:18px; } }
  </style>
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <div class="site-banner"><img src="/assets/images/aineko-banner.png" alt="今日もあいネコ"></div>
  <main>
    <a class="crumb" href="/">← ホームへ戻る</a>
    <section class="hero">
      <h1>AI活用シリーズ</h1>
      <p class="lead">note記事として増やしていく読みものの入口です。AI活用、仕事、子育て、ツールづくりの体験を、あとからシリーズ別に整理できる形にしています。</p>
    </section>
    <section class="section">
      <div class="series-grid">
        <article class="series-card">
          <span class="status">準備中</span>
          <h2>AI時代を生き抜くために</h2>
          <p>AIを難しいものとして構えすぎず、日々の作業や発信にどう使うかを実体験ベースでまとめます。</p>
        </article>
      </div>
    </section>
    <section class="section">
      <h2>追加予定の置き場</h2>
      <div class="slot-list">
        <div class="slot">シリーズカード、記事カード、サムネイルをここに追加予定</div>
        <div class="slot">note公開後は記事URLや公開日、タグを並べられる構造</div>
      </div>
    </section>
  </main>
  <footer>© 2026 今日もあいネコ</footer>
</body>
</html>
