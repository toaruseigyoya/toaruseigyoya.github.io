<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>公開ツール一覧 | とある制御屋の備忘録</title>
  <meta name="description" content="とある制御屋の備忘録で公開しているツールの入口です。汎用ツール、タスク管理、工程管理アプリ、おすすめツール紹介などを選べます。">
  <link rel="canonical" href="https://toaruseigyoya.github.io/tools/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="とある制御屋の備忘録">
  <meta property="og:title" content="公開ツール一覧 | とある制御屋の備忘録">
  <meta property="og:description" content="汎用ツール、タスク管理、工程管理アプリ、おすすめツール紹介など、公開しているツールを選べるページです。">
  <meta property="og:url" content="https://toaruseigyoya.github.io/tools/">
  <meta property="og:image" content="https://toaruseigyoya.github.io/assets/images/banner-tools.png">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --mint:#36c49f; --sky:#5fb5ff; --pink:#ff8cb3; --ink:#273044; --sub:#65708a; --line:#f0dccb;
      --shadow:0 14px 38px rgba(85,70,50,.12);
    }
    body { font-family:'Segoe UI','Yu Gothic UI','Hiragino Sans',sans-serif; background:linear-gradient(180deg,#fff7df,#f7fbff 58%,#fff7fb); color:var(--ink); line-height:1.75; min-height:100vh; }
    .site-banner { max-width:920px; margin:18px auto 0; padding:0 18px; }
    .site-banner img { width:100%; max-height:300px; object-fit:contain; background:#fff; border-radius:18px; border:3px solid #fff; box-shadow:var(--shadow); display:block; }
    main { max-width:1040px; margin:0 auto; padding:24px 20px 70px; }
    .home-link { display:inline-flex; align-items:center; min-height:42px; padding:8px 12px; border-radius:12px; background:#f6fbff; border:1px solid #dcecf7; color:#526179; text-decoration:none; font-size:.92rem; font-weight:900; margin-bottom:14px; }
    .home-link:hover { color:#273044; text-decoration:underline; }
    .hero, .section { background:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.95); border-radius:18px; box-shadow:var(--shadow); padding:22px; margin-bottom:16px; }
    h1 { font-size:clamp(1.8rem,5vw,2.8rem); line-height:1.2; letter-spacing:0; margin-bottom:10px; }
    .lead { color:var(--sub); max-width:760px; font-size:1rem; }
    .tool-links { display:grid; gap:10px; }
    .tool-links a { display:block; padding:8px 0; color:var(--ink); font-size:1rem; font-weight:900; text-decoration:none; border-bottom:1px solid var(--line); }
    .tool-links a:hover { color:#0f7f68; text-decoration:underline; }
    .footer-links { display:flex; justify-content:center; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
    .footer-links a { display:inline-flex; align-items:center; min-height:42px; padding:8px 12px; border-radius:12px; background:#f6fbff; border:1px solid #dcecf7; color:#526179; text-decoration:none; font-size:.92rem; font-weight:900; }
    .footer-links a:hover { color:#273044; text-decoration:underline; }
    footer { text-align:center; color:#8a7890; font-size:.9rem; padding:24px; }
    @media (max-width:700px) {
      .site-banner, main { padding-inline:14px; }
      .hero, .section { padding:18px; }
    }
  </style>
  <script src="/assets/site-config.js"></script>
  <script defer src="/assets/share-buttons.js"></script>
</head>
<body>
  <div class="site-banner"><img src="/assets/images/banner-tools.png" alt="とある制御屋の備忘録"></div>
  <main>
    <a class="home-link" href="/">ホームへ戻る</a>
    <section class="hero">
      <h1>公開ツール一覧</h1>
      <p class="lead">公開中のツール集</p>
    </section>
    <section class="section" aria-label="ツールカテゴリ">
      <div class="tool-links">
        <a href="/itinerary/">工程管理アプリ</a>
        <a href="/utilities/">汎用ツール</a>
        <a href="/tasks/">タスク管理</a>
        <a href="/affiliate/">おすすめツール紹介</a>
      </div>
    </section>
  </main>
  <footer>
    <nav class="footer-links" aria-label="サイト情報">
      <a href="/contact/">お問い合わせ</a>
      <a href="/privacy/">プライバシーポリシー</a>
      <a href="/disclaimer/">免責事項</a>
    </nav>
    © 2026 とある制御屋の備忘録
  </footer>
</body>
</html>
